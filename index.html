<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pure Snowflake Geometry</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #333; margin-top: 20px; image-rendering: pixelated; width: 600px; height: 600px; }
        input { width: 300px; padding: 10px; margin: 20px; background: #222; border: 1px solid #555; color: #0f0; }
    </style>
</head>
<body>

    <input type="text" id="input" value="SNOWFLAKE" placeholder="Пиши здесь...">
    <canvas id="canvas" width="800" height="800"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('input');

    // Простые узоры 7x7
    const PATTERNS = [
        [0,24,60,126,126,60,24,0], [127,65,93,85,93,65,127], [0,0,30,30,30,30,0,0],
        [73,42,28,127,28,42,73], [119,85,119,0,119,85,119], [1,3,7,15,31,63,127]
    ];

    function seededRandom(s) {
        let h = 0; for(let i=0; i<s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
        return function() { h = Math.sin(h++) * 10000; return h - Math.floor(h); };
    }

    function drawSprite(ctx, pattern, x, y, size) {
        const p = size / 7;
        for(let r=0; r<7; r++) {
            for(let c=0; c<7; c++) {
                if((pattern[r] >> (6-c)) & 1) {
                    ctx.fillRect(x + c*p, y + r*p, p + 0.5, p + 0.5);
                }
            }
        }
    }

    function drawSnowflake() {
        const rnd = seededRandom(input.value);
        const center = canvas.width / 2;
        const gridSize = 8; // Количество блоков в луче
        const blockSize = (canvas.width / 2) / gridSize;

        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Рисуем 8 секторов
        for (let i = 0; i < 8; i++) {
            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(i * Math.PI / 4); // Поворот на 45 градусов
            
            // Зеркальное отражение каждого второго сектора для смыкания узора
            if (i % 2 === 1) ctx.scale(1, -1);

            // Рисуем один "ломтик" (октант)
            ctx.fillStyle = "white";
            const sliceRnd = seededRandom(input.value); // Тот же сид для каждого ломтика
            
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x <= y; x++) { // Рисуем только треугольник
                    const pattern = PATTERNS[Math.floor(sliceRnd() * PATTERNS.length)];
                    drawSprite(ctx, pattern, x * blockSize, y * blockSize, blockSize);
                }
            }
            ctx.restore();
        }
    }

    input.addEventListener('input', drawSnowflake);
    drawSnowflake();
</script>
</body>
</html>
