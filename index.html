<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Snowflake: Step-by-Step Reflection</title>
    <style>
        body { background: #000; color: #555; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        canvas { border: 1px solid #222; box-shadow: 0 0 40px rgba(0,255,0,0.05); cursor: crosshair; }
        input { background: transparent; border: none; border-bottom: 1px solid #333; color: #0f0; text-align: center; font-size: 20px; padding: 10px; outline: none; width: 300px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <input type="text" id="seedInput" value="ALGORITHM" placeholder="TYPE SOMETHING...">
    <canvas id="canvas" width="800" height="800"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const seedInput = document.getElementById('seedInput');

    // Набор базовых орнаментальных спрайтов 7x7
    const SPRITES = [
        [0,24,60,126,126,60,24,0], [127,65,93,85,93,65,127], [85,62,99,42,99,62,85],
        [42,119,34,73,34,119,42], [28,42,73,119,73,42,28], [119,85,119,0,119,85,119],
        [62,73,93,127,93,73,62], [8,42,8,119,8,42,8], [99,99,0,0,0,99,99], [99,99,99,99,99,99,99]
    ];

    // Сидированный рандом
    function seededRandom(s) {
        let h = 0; for(let i=0; i<s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
        return function() { h = Math.sin(h++) * 10000; return h - Math.floor(h); };
    }

    function drawSprite(targetCtx, pattern, x, y, size) {
        const pSize = size / 7;
        for(let r=0; r<7; r++) {
            for(let c=0; c<7; c++) {
                if((pattern[r] >> (6-c)) & 1) {
                    targetCtx.fillRect(x + c*pSize, y + r*pSize, pSize + 0.3, pSize + 0.3);
                }
            }
        }
    }

    function render() {
        const rnd = seededRandom(seedInput.value);
        const size = canvas.width;
        const half = size / 2;
        const gridSize = 10; // Сложность сетки
        const blockSize = half / gridSize;

        // Временные холсты для этапов отражения
        const octantCanvas = document.createElement('canvas');
        octantCanvas.width = half; octantCanvas.height = half;
        const oCtx = octantCanvas.getContext('2d');

        const quadrantCanvas = document.createElement('canvas');
        quadrantCanvas.width = half; quadrantCanvas.height = half;
        const qCtx = quadrantCanvas.getContext('2d');

        // ШАГ 0: Генерируем базовый треугольник (Октант 0-45°)
        oCtx.fillStyle = "white";
        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x <= y; x++) { // Строго x <= y создает треугольник
                const pattern = SPRITES[Math.floor(rnd() * SPRITES.length)];
                drawSprite(oCtx, pattern, x * blockSize, y * blockSize, blockSize);
            }
        }

        // ШАГ 1: Зеркало по диагонали (Октант -> Квадрант 90°)
        // Сначала рисуем оригинал
        qCtx.drawImage(octantCanvas, 0, 0);
        // Отражаем: меняем X и Y местами через transform
        qCtx.save();
        qCtx.setTransform(0, 1, 1, 0, 0, 0); // Матрица отражения по диагонали y=x
        qCtx.drawImage(octantCanvas, 0, 0);
        qCtx.restore();

        // ШАГ 2 и 3: Собираем финальную снежинку на основном холсте
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, size, size);

        // Правая верхняя четверть
        ctx.drawImage(quadrantCanvas, half, 0);

        // Левая верхняя четверть (Вертикальное зеркало)
        ctx.save();
        ctx.translate(half, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(quadrantCanvas, 0, 0);
        ctx.restore();

        // Нижняя половина (Горизонтальное зеркало)
        ctx.save();
        ctx.translate(0, half);
        ctx.scale(1, -1);
        ctx.drawImage(canvas, 0, -half); // Отражаем всю верхнюю часть вниз
        ctx.restore();
    }

    seedInput.addEventListener('input', render);
    render();
</script>
</body>
</html>
